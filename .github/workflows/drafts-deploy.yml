name: Deploy drafts review channel

# Rebuilds the site from data/articles.json (the "draft: true" flag drives the
# draft manifest) and deploys to a fixed Firebase Hosting preview channel "drafts".
# Flip a flag, push to rebuild/publishing-system, and drafts.html reflects it automatically.

on:
  push:
    branches: [rebuild/publishing-system]
    paths:
      - 'data/**'
      - 'articles/**'
      - 'assets/**'
      - 'drafts.html'
      - 'studio.html'
      - 'studio-review.html'
      - '.github/workflows/drafts-deploy.yml'
  workflow_dispatch:
  schedule:
    # Weekly keep-alive: preview channels expire after 30 days of no deploy.
    - cron: '0 6 * * 1'

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  deploy-drafts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Build (regenerates data/draft-articles.json from the draft flag)
        run: |
          npm ci || npm install
          npm run build

      - name: Deploy to the "drafts" preview channel
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_LITTORALICIOUS_WEB_ECEED }}
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-sa.json
        run: |
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$GOOGLE_APPLICATION_CREDENTIALS"
          npx --yes firebase-tools@15 hosting:channel:deploy drafts --expires 30d \
            --project littoralicious-web-eceed --non-interactive
