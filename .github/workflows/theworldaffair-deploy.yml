name: Deploy Littoralicious (live)

# Publishes the live Littoralicious site to Firebase Hosting on EVERY push to
# rebuild/publishing-system (the live branch). Firebase Hosting deploys are
# whole-site, so this publishes the current state of the branch — the gazette,
# studio, articles, terroir, everything. Keep unfinished publication work behind
# the draft flag in data/articles.json (drafts stay off the homepage/sitemap/feed)
# or off this branch. Auth: the FIREBASE_SERVICE_ACCOUNT_LITTORALICIOUS_WEB_ECEED
# repo Actions secret (a Firebase service-account JSON) — deployed via the
# Firebase CLI directly (the old action-hosting-deploy@v0 has no Node 24 release).

on:
  push:
    branches: [rebuild/publishing-system]
  workflow_dispatch:

permissions:
  contents: read

# Never run two live deploys at once; let an in-flight one finish.
concurrency:
  group: firebase-hosting-live
  cancel-in-progress: false

jobs:
  deploy-live:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Build (regenerate draft manifest + data)
        run: |
          npm ci || npm install
          npm run build

      - name: Validate (structure gate — blocks a broken deploy)
        run: npm run validate

      - name: Deploy Firestore rules (repo rules == live rules)
        # Studio note-saving depends on the repo's firestore.rules being the ones
        # actually deployed; hosting-only deploys let them drift. Non-fatal so a
        # missing IAM permission can never block the site deploy — but it is
        # surfaced as a warning to fix.
        continue-on-error: true
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_LITTORALICIOUS_WEB_ECEED }}
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-sa.json
        run: |
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$GOOGLE_APPLICATION_CREDENTIALS"
          # No `|| echo` here: a real non-zero exit must surface the step as a
          # (non-blocking, thanks to continue-on-error) FAILURE — a buried
          # ::warning:: on a green check would hide rules drift on the DB's only
          # access-control boundary. If this fails, grant the service account
          # 'Firebase Rules Admin' or run: firebase deploy --only firestore:rules
          echo "::warning::If this step fails, live firestore.rules have NOT been updated — deploy them manually."
          npx --yes firebase-tools@15 deploy --only firestore:rules \
            --project littoralicious-web-eceed --non-interactive

      - name: Deploy to LIVE Firebase Hosting
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_LITTORALICIOUS_WEB_ECEED }}
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-sa.json
        run: |
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$GOOGLE_APPLICATION_CREDENTIALS"
          set +e
          out=$(npx --yes firebase-tools@15 deploy --only hosting \
            --project littoralicious-web-eceed --non-interactive 2>&1)
          code=$?
          printf '%s\n' "$out"
          if [ $code -ne 0 ]; then
            # Benign no-op: a push that doesn't change the SERVED output (e.g. a
            # draft-only or non-hosted-file commit) yields a version identical to
            # what's already live, and Firebase refuses to re-release it. Nothing
            # to deploy = success. Any OTHER error is a real failure.
            if printf '%s' "$out" | grep -q "is the current active version"; then
              echo "::notice::Hosting content unchanged (version already live) — no-op deploy treated as success."
              exit 0
            fi
            exit $code
          fi
