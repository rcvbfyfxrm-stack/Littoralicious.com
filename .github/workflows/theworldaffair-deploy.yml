name: Deploy Littoralicious (live)

# Publishes the live Littoralicious site to Firebase Hosting on EVERY push to
# rebuild/publishing-system (the live branch). Firebase Hosting deploys are
# whole-site, so this publishes the current state of the branch — the gazette,
# studio, articles, terroir, everything. Keep unfinished publication work behind
# the draft flag in data/articles.json (drafts stay off the homepage/sitemap/feed)
# or off this branch. Auth: the FIREBASE_SERVICE_ACCOUNT_LITTORALICIOUS_WEB_ECEED
# repo Actions secret (a Firebase service-account JSON) — deployed via the
# Firebase CLI directly (the old action-hosting-deploy@v0 has no Node 24 release).

on:
  push:
    branches: [rebuild/publishing-system]
  workflow_dispatch:

permissions:
  contents: read

# Never run two live deploys at once; let an in-flight one finish.
concurrency:
  group: firebase-hosting-live
  cancel-in-progress: false

jobs:
  deploy-live:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Build (regenerate draft manifest + data)
        run: |
          npm ci || npm install
          npm run build

      - name: Deploy to LIVE Firebase Hosting
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_LITTORALICIOUS_WEB_ECEED }}
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-sa.json
        run: |
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$GOOGLE_APPLICATION_CREDENTIALS"
          npx --yes firebase-tools@15 deploy --only hosting \
            --project littoralicious-web-eceed --non-interactive
