name: Deploy Littoralicious (live)

# Publishes the live Littoralicious site to Firebase Hosting on EVERY push to
# rebuild/publishing-system (the live branch). Firebase Hosting deploys are
# whole-site, so this publishes the current state of the branch — the gazette,
# studio, articles, terroir, everything. Keep unfinished publication work behind
# the draft flag in data/articles.json (drafts stay off the homepage/sitemap/feed)
# or off this branch. Requires the FIREBASE_SERVICE_ACCOUNT_LITTORALICIOUS_WEB_ECEED
# repo secret (create with `firebase init hosting:github`).

on:
  push:
    branches: [rebuild/publishing-system]
  workflow_dispatch:

permissions:
  contents: read

# Never run two live deploys at once; let an in-flight one finish.
concurrency:
  group: firebase-hosting-live
  cancel-in-progress: false

jobs:
  deploy-live:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build (regenerate draft manifest + data)
        run: |
          npm ci || npm install
          npm run build

      - name: Deploy to LIVE Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_LITTORALICIOUS_WEB_ECEED }}
          projectId: littoralicious-web-eceed
          channelId: live
