name: The World Affair — autopublish

# Autonomous gazette publisher on GitHub's OWN infrastructure (which CAN write to
# this repo), independent of the Claude Code cloud routine whose sandbox egress
# proxy blocks GitHub writes by org policy (403 "write access not permitted").
#
# Two-model pipeline:
#   1. SONNET 5   — researches today's 3 rotation beats and writes the edition (fast, light on quota)
#   2. OPUS 4.8   — editor-in-chief supervision: audits the draft against the spec and fixes it surgically
#   3. workflow commits, pushes, and deploys to Firebase.
#
# ── AUTH — add ONE repo secret (API key is preferred; it has NO session cap) ──
#   • ANTHROPIC_API_KEY        — console.anthropic.com; pay-as-you-go, no usage cap.  ← best for an unattended 3×/week job
#   • CLAUDE_CODE_OAUTH_TOKEN  — `claude setup-token`; uses your plan, but subject to your plan's session/usage limit.
# Both are passed to Claude Code; if the API key is present it takes precedence.
# Until one is set the job SKIPS cleanly. FIREBASE_SERVICE_ACCOUNT_LITTORALICIOUS_WEB_ECEED already exists.
#
# NOTE: this is the ALTERNATIVE to the cloud routine trig_01FWy1qd — keep that DISABLED so no double-publish.

on:
  schedule:
    - cron: '0 1 * * 1,3,5'   # 01:00 UTC — Mon / Wed / Fri (the beat rotation)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: twa-autopublish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Check for a Claude auth secret
        id: guard
        env:
          OAUTH: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          APIKEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$OAUTH" ] && [ -z "$APIKEY" ]; then
            echo "::notice::No Claude auth secret set — add ANTHROPIC_API_KEY (preferred) or CLAUDE_CODE_OAUTH_TOKEN. Skipping."
            echo "go=false" >> "$GITHUB_OUTPUT"
          else
            echo "go=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout live branch
        if: steps.guard.outputs.go == 'true'
        uses: actions/checkout@v5
        with:
          ref: rebuild/publishing-system
          fetch-depth: 0

      - name: Setup Node
        if: steps.guard.outputs.go == 'true'
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Install Claude Code
        if: steps.guard.outputs.go == 'true'
        run: npm i -g @anthropic-ai/claude-code

      - name: Write the edition — SONNET 5 (research + write)
        if: steps.guard.outputs.go == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          claude -p "You are the WRITER producing today's The World Affair edition inside a GitHub Actions checkout of branch rebuild/publishing-system. The repo is ALREADY checked out here — do NOT clone. (1) Read theworldaffair/.twa-magazine-spec.md, theworldaffair/.front-template.html and theworldaffair/.article-template.html. (2) Execute the spec STEP 1 through STEP 2f ONLY: research today's three FIXED weekday-rotation beats and WRITE the front page theworldaffair/$(date +%F).html, the synthese plus the three feature files under theworldaffair/$(date +%F)/, and update theworldaffair/editions.json. (3) Do NOT run STEP 2g or ANY git command — just leave the files on disk. Obey the LOI EDITORIALE, the fixed weekday rotation (Lundi Pouvoir&Frontieres/Marches&Capital/Silicium ; Mercredi Mer&Navigation/Ciel&Energie/Corps&Longevite ; Vendredi Table&Terroir/Culture&Creation/Bonnes Nouvelles), the T3-floor rule, and emit the .twa-verdict typographic stamp — never emoji." \
            --model claude-sonnet-5 \
            --dangerously-skip-permissions

      - name: Supervise — OPUS 4.8 (editor-in-chief review + fix)
        if: steps.guard.outputs.go == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          claude -p "You are the OPUS EDITOR-IN-CHIEF supervising today's draft edition that a Sonnet writer just produced in this checkout. Do NOT clone, do NOT run any git command. The standard is theworldaffair/.twa-magazine-spec.md — read it, then read the files just written: theworldaffair/$(date +%F).html and everything under theworldaffair/$(date +%F)/. Rigorously audit against: the LOI EDITORIALE (payoff-first, one idea per section, re-hook, never lose attention); the fixed weekday rotation (are these the correct 3 beats for today?); the T3-floor rule (NO T3-wire-only claim may read 'Confirme' — downgrade to 'A verifier' or cut it; a Confirme needs T0/T1/T2 or heavy independent corroboration); every load-bearing claim carries an inline <a href> source; the .twa-verdict typographic stamps are used and there is ZERO emoji; the beat-class components (Le Tape / Carte des Preuves / Carte Cui-Bono / Le Fait du Jour) fit each beat; the cluster is fresh; tight, literary, incarnated French. FIX problems by EDITING the files directly: tighten weak prose, correct any overstated verdict, add missing sources or cut unsourced claims, delete any emoji, sharpen flat headlines. Leave already-correct files untouched; improve surgically, do NOT regenerate wholesale. Ensure the edition is publish-ready. Do NOT run git." \
            --model claude-opus-4-8 \
            --dangerously-skip-permissions

      - name: Commit + push the edition
        if: steps.guard.outputs.go == 'true'
        run: |
          DATE=$(date +%F)
          git config user.name "NEXUS World Affair"
          git config user.email "nexus-bot@users.noreply.github.com"
          git add theworldaffair/
          if git diff --cached --quiet; then
            echo "::error::No edition files produced — aborting before deploy."
            exit 1
          fi
          git commit -m "World Affair: cluster magazine $DATE (Sonnet write · Opus supervise)"
          git push origin HEAD:rebuild/publishing-system

      - name: Deploy to live Firebase Hosting
        if: steps.guard.outputs.go == 'true'
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_LITTORALICIOUS_WEB_ECEED }}
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-sa.json
        run: |
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$GOOGLE_APPLICATION_CREDENTIALS"
          npm ci || npm install
          npm run build
          set +e
          out=$(npx --yes firebase-tools@15 deploy --only hosting --project littoralicious-web-eceed --non-interactive 2>&1)
          code=$?; printf '%s\n' "$out"
          if [ $code -ne 0 ] && printf '%s' "$out" | grep -q "is the current active version"; then
            echo "::notice::Hosting unchanged — no-op deploy treated as success."; exit 0
          fi
          exit $code
