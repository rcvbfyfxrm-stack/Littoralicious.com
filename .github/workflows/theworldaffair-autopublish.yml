name: The World Affair — autopublish

# Autonomous gazette publisher that runs on GitHub's OWN infrastructure — which
# CAN write to this repo — independent of the Claude Code cloud routine whose
# sandbox currently cannot push. It runs Claude Code headless to research + write
# today's edition per theworldaffair/.twa-magazine-spec.md, then commits, pushes,
# and deploys to Firebase: the whole pipeline in one job.
#
# ── ONE-TIME SETUP ────────────────────────────────────────────────────────────
# Add ONE repo secret (Settings ▸ Secrets and variables ▸ Actions ▸ New secret):
#   • CLAUDE_CODE_OAUTH_TOKEN  — run `claude setup-token` locally; uses your
#                                Claude Max/Pro plan, NO extra API billing.  (recommended)
#   • ANTHROPIC_API_KEY        — from console.anthropic.com; billed as API usage.
# FIREBASE_SERVICE_ACCOUNT_LITTORALICIOUS_WEB_ECEED already exists in this repo.
# Until a Claude secret is present, the job SKIPS cleanly (no failed runs).
#
# NOTE: this is an ALTERNATIVE to the cloud routine trig_01FWy1qd. If you enable
# this Action, DISABLE that routine (or one edition gets published twice).

on:
  schedule:
    - cron: '0 1 * * 1,3,5'   # 01:00 UTC — Mon / Wed / Fri (the beat rotation)
  workflow_dispatch:           # run on demand from the Actions tab

permissions:
  contents: write

concurrency:
  group: twa-autopublish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Check for a Claude auth secret
        id: guard
        env:
          OAUTH: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          APIKEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$OAUTH" ] && [ -z "$APIKEY" ]; then
            echo "::notice::No Claude auth secret set — add CLAUDE_CODE_OAUTH_TOKEN (recommended) or ANTHROPIC_API_KEY to enable autopublish. Skipping."
            echo "go=false" >> "$GITHUB_OUTPUT"
          else
            echo "go=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout live branch
        if: steps.guard.outputs.go == 'true'
        uses: actions/checkout@v5
        with:
          ref: rebuild/publishing-system
          fetch-depth: 0

      - name: Setup Node
        if: steps.guard.outputs.go == 'true'
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Install Claude Code
        if: steps.guard.outputs.go == 'true'
        run: npm i -g @anthropic-ai/claude-code

      - name: Generate today's edition (research + write; no git)
        if: steps.guard.outputs.go == 'true'
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude -p "You are generating today's The World Affair edition inside a GitHub Actions checkout of branch rebuild/publishing-system. The repo is ALREADY checked out in the current directory — do NOT clone. (1) Read theworldaffair/.twa-magazine-spec.md, theworldaffair/.front-template.html and theworldaffair/.article-template.html. (2) Execute the spec STEP 1 through STEP 2f ONLY: research today's three FIXED weekday-rotation beats and WRITE the front page theworldaffair/\$(date +%F).html, the synthese plus the three feature files under theworldaffair/\$(date +%F)/, and update theworldaffair/editions.json. (3) Do NOT run STEP 2g or ANY git command — this workflow commits, pushes and deploys for you; just leave the files on disk. Obey the LOI EDITORIALE, the fixed weekday rotation (Lundi Pouvoir&Frontieres/Marches&Capital/Silicium ; Mercredi Mer&Navigation/Ciel&Energie/Corps&Longevite ; Vendredi Table&Terroir/Culture&Creation/Bonnes Nouvelles), the T3-floor rule, and emit the .twa-verdict typographic stamp — never emoji." \
            --model claude-opus-4-8 \
            --dangerously-skip-permissions

      - name: Commit + push the edition
        if: steps.guard.outputs.go == 'true'
        run: |
          DATE=$(date +%F)
          git config user.name "NEXUS World Affair"
          git config user.email "nexus-bot@users.noreply.github.com"
          git add theworldaffair/
          if git diff --cached --quiet; then
            echo "::error::Claude produced no edition files — aborting before deploy."
            exit 1
          fi
          git commit -m "World Affair: cluster magazine $DATE (autopublish)"
          git push origin HEAD:rebuild/publishing-system

      - name: Deploy to live Firebase Hosting
        if: steps.guard.outputs.go == 'true'
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_LITTORALICIOUS_WEB_ECEED }}
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-sa.json
        run: |
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$GOOGLE_APPLICATION_CREDENTIALS"
          npm ci || npm install
          npm run build
          set +e
          out=$(npx --yes firebase-tools@15 deploy --only hosting --project littoralicious-web-eceed --non-interactive 2>&1)
          code=$?; printf '%s\n' "$out"
          if [ $code -ne 0 ] && printf '%s' "$out" | grep -q "is the current active version"; then
            echo "::notice::Hosting unchanged — no-op deploy treated as success."; exit 0
          fi
          exit $code
