<!DOCTYPE html><html><head><meta charset="UTF-8"><style>
  html,body{margin:0;padding:0}
  .og{width:1200px;height:630px;background:#fafafa;box-sizing:border-box;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      font-family:Georgia,'Times New Roman',serif;position:relative}
  .frame{position:absolute;top:30px;left:30px;right:30px;bottom:30px;border:1px solid #dcdcdc}
  .flame{margin-bottom:30px}
  .word{font-size:80px;letter-spacing:.14em;color:#0a0a0a;font-weight:400;line-height:1}
  .rule{width:120px;height:2px;background:#2d4a5e;margin:28px 0}
  .tag{font-family:system-ui,-apple-system,'Segoe UI',Helvetica,sans-serif;
       font-size:23px;letter-spacing:.14em;text-transform:uppercase;color:#555}
  .nurture{font-style:italic;font-size:31px;color:#2d4a5e;margin-top:30px}

  /* --- PER-ARTICLE VARIANT (.og--article) — token-ready, design-lock-safe ----
     Default render above is the brand plate. The variant below is for a future
     per-article OG pipeline (render this file per article with the TITLE /
     CATEGORY / NUMBER tokens filled, then point lib.mjs's og:image at the
     per-article PNG). Section is signalled by the CATEGORY eyebrow text, NOT by
     colour — the design lock is monochrome + sea (#2d4a5e), so we do not add
     five bright accents. Keep ink #0a0a0a, sea #2d4a5e, salt #555, paper #fafafa. */
  .og--article{align-items:flex-start;justify-content:center;padding:90px;text-align:left}
  .og--article .accent-bar{position:absolute;top:30px;left:30px;width:140px;height:6px;background:#2d4a5e}
  .og--article .eyebrow{font-family:system-ui,-apple-system,'Segoe UI',Helvetica,sans-serif;
       font-size:22px;letter-spacing:.16em;text-transform:uppercase;color:#2d4a5e;margin:40px 0 26px}
  .og--article .title{font-size:60px;line-height:1.1;color:#0a0a0a;max-width:18ch;margin:0}
  .og--article .number-chip{margin-top:30px;font-family:'SF Mono',SFMono-Regular,Consolas,Menlo,monospace;
       font-size:28px;letter-spacing:.04em;color:#2d4a5e;border:1px solid #dcdcdc;padding:8px 16px;display:inline-block}
  .og--article .brand{position:absolute;bottom:74px;left:90px;font-size:24px;letter-spacing:.14em;color:#555}
</style></head><body>

  <!-- DEFAULT RENDER — the brand plate (one shared og-image.png for the whole site). -->
  <div class="og">
    <div class="frame"></div>
    <svg class="flame" width="128" height="128" viewBox="0 0 100 100">
      <circle cx="50" cy="50" r="46" fill="none" stroke="#0a0a0a" stroke-width="1"/>
      <path d="M 50 15 C 42 30, 35 40, 35 55 C 35 72, 50 82, 50 82 C 50 82, 65 72, 65 55 C 65 40, 58 30, 50 15 Z" fill="none" stroke="#0a0a0a" stroke-width="2"/>
      <path d="M 50 35 C 46 45, 43 52, 43 60 C 43 70, 50 75, 50 75 C 50 75, 57 70, 57 60 C 57 52, 54 45, 50 35 Z" fill="#2d4a5e"/>
      <path d="M 35 82 C 40 78, 45 86, 50 82 C 55 78, 60 86, 65 82" fill="none" stroke="#0a0a0a" stroke-width="2" stroke-linecap="round"/>
    </svg>
    <div class="word">LITTORALICIOUS</div>
    <div class="rule"></div>
    <div class="tag">Modern Science &middot; Regional Recipes &middot; From the Sea</div>
    <div class="nurture">One purpose: Nurture.</div>
  </div>

  <!-- PER-ARTICLE VARIANT — to ship per-article share cards: (1) render this block
       (not the brand plate) per article with the tokens filled; (2) emit a per-article
       PNG; (3) point lib.mjs's og:image / twitter:image at it instead of the static
       og-image.png. The {{NUMBER}} chip is optional — drop the element when the piece
       has no single headline figure. Until that pipeline exists, the brand plate above
       is the live share card.
  <div class="og og--article">
    <div class="frame"></div>
    <div class="accent-bar"></div>
    <div class="eyebrow">{{CATEGORY}}</div>
    <h1 class="title">{{TITLE}}</h1>
    <div class="number-chip">{{NUMBER}}</div>
    <div class="brand">LITTORALICIOUS</div>
  </div>
  -->
</body></html>
