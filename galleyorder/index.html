<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Galley Order System — free, open provisioning tool for yacht chefs. 2,512 items with the brands that make the difference. Seasonal, allergen-aware, PAX-math, multi-draft. From Littoralicious." />
  <title>Galley Order — Littoralicious</title>
  <link rel="stylesheet" href="style.css?v=20260520-ai-print" />
  <link rel="icon" type="image/svg+xml" href="/assets/logo/favicon.svg" />
  <meta property="og:title" content="Galley Order System — Littoralicious" />
  <meta property="og:description" content="Free, open provisioning tool for yacht chefs. 2,500+ items, intelligence baked in, prints clean A4." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://www.littoralicious.com/galleyorder/" />
</head>
<body>
  <div class="app">
    <header class="masthead">
      <div class="masthead-row">
        <div class="masthead-brand">
          <a href="/" class="masthead-home-link" title="Back to littoralicious.com">←&nbsp;Littoralicious</a>
          <div class="masthead-title">Galley Order</div>
          <div class="masthead-tagline">Littoralicious · The Provisioning System</div>
        </div>
        <div class="masthead-meta">
          <input id="meta-date" type="date" title="Order date" />
          <input id="meta-supplier" type="text" placeholder="Supplier" autocomplete="off" />
          <input id="meta-vessel" type="text" placeholder="Vessel / location" autocomplete="off" />
          <span class="autosave-indicator" id="autosave">Autosaved</span>
        </div>
        <div class="masthead-actions">
          <button class="btn btn-primary" id="btn-upload-list" title="Paste a list of items — auto-match and add (l)">+ Add list</button>
          <button class="btn btn-primary" id="btn-upload-prefs" title="Paste a guest preference sheet — analyse and highlight (g)">+ Add prefs</button>
          <button class="btn btn-primary" id="btn-archive" title="Archive current draft (a)">Archive</button>
          <button class="btn btn-ghost" id="btn-history" title="Browse archives">Archives</button>
          <button class="btn btn-ghost" id="btn-copy-text" title="Copy as plain text — paste to WhatsApp (c)">Copy text</button>
          <button class="btn" id="btn-print" title="Print PDF — choose full order or single category (p)">Print PDF</button>
          <button class="btn-icon" id="btn-about" title="About this tool">i</button>
          <button class="theme-toggle" id="btn-theme" title="Toggle dark mode (t)">◐</button>
        </div>
      </div>
      <div class="prov-bar"></div>
    </header>
    <div class="body">
      <aside class="sidebar"></aside>
      <main class="main"></main>
    </div>
  </div>
  <script src="data.js?v=20260520-ai-print"></script>
  <script src="produce.js?v=20260520-ai-print"></script>
  <script src="enrich.js?v=20260520-ai-print"></script>
  <script src="app.js?v=20260520-ai-print"></script>
</body>
</html>
