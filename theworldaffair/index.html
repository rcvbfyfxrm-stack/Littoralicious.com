<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The World Affair — Intelligence quotidienne</title>
<meta name="description" content="The World Affair — la gazette NEXUS : 27 domaines d'actualité du lundi au vendredi, plus la synthèse de la semaine le samedi.">
<style>@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=UnifrakturMaguntia&display=swap');
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { font-family: 'Libre Baskerville', Georgia, 'Times New Roman', serif; background: #f4f1eb; color: #1a1714; line-height: 1.6; -webkit-font-smoothing: antialiased; min-height: 100vh; }
::selection { background: #2d4a5e; color: #f4f1eb; }
a { color: inherit; text-decoration: none; transition: color 0.15s; }
a:hover { color: #3a5a6a; }
.masthead { text-align: center; padding: 40px 24px 0; border-bottom: 4px double #b5ad9f; }
.masthead-rule-top { display: flex; align-items: center; gap: 14px; font-size: 9px; color: #8a847a; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 16px; }
.masthead-rule-top::before, .masthead-rule-top::after { content: ''; flex: 1; height: 1px; background: #c8c0b4; }
.masthead-title { font-family: 'UnifrakturMaguntia', 'Playfair Display', serif; font-size: 52px; font-weight: 400; letter-spacing: 2px; color: #1a1714; line-height: 1; margin: 0; }
.masthead-title a { text-decoration: none; color: inherit; }
.masthead-meta { display: flex; justify-content: center; align-items: center; gap: 20px; font-size: 11px; color: #8a847a; letter-spacing: 1px; text-transform: uppercase; margin-top: 14px; padding-bottom: 16px; flex-wrap: wrap; }
.masthead-dot { color: #c8c0b4; }
.nav-bar { display: flex; justify-content: center; gap: 0; border-bottom: 1px solid #c8c0b4; background: #ede9e1; padding: 0; flex-wrap: wrap; }
.nav-link { padding: 10px 18px; font-family: 'Libre Baskerville', serif; font-size: 11px; color: #4a4540; text-decoration: none; text-transform: uppercase; letter-spacing: 1.5px; border-right: 1px solid #c8c0b4; transition: all 0.15s; }
.nav-link:first-child { border-left: 1px solid #c8c0b4; }
.nav-link:hover { background: #e6e1d8; color: #1a1714; }
.nav-link.active { background: #1a1714; color: #f4f1eb; }
.page { max-width: 1100px; margin: 0 auto; padding: 0 24px; }
.section-divider { display: flex; align-items: center; gap: 14px; margin: 38px 0 22px; font-size: 10px; color: #8a847a; letter-spacing: 3px; text-transform: uppercase; }
.section-divider::before, .section-divider::after { content: ''; flex: 1; height: 1px; background: #c8c0b4; }
/* hero */
.hero { display: block; margin: 36px 0 8px; padding: 30px 30px 28px; background: #ede9e1; border-top: 3px solid #1a1714; border-bottom: 1px solid #c8c0b4; position: relative; transition: background 0.15s; }
.hero:hover { background: #e6e1d8; }
.hero-overline { font-size: 11px; text-transform: uppercase; letter-spacing: 2px; font-weight: 700; color: #8b3a3a; margin-bottom: 10px; display: flex; align-items: center; gap: 10px; }
.kind-badge { font-size: 9px; letter-spacing: 1.5px; padding: 2px 8px; border: 1px solid #2d4a5e; color: #2d4a5e; border-radius: 2px; }
.kind-badge.weekly { border-color: #8b3a3a; color: #8b3a3a; }
.hero-title { font-family: 'Playfair Display', serif; font-size: 38px; font-weight: 900; line-height: 1.15; color: #1a1714; margin-bottom: 10px; }
.hero-summary { font-size: 14px; color: #4a4540; line-height: 1.7; font-style: italic; max-width: 720px; }
.hero-meta { margin-top: 16px; font-size: 11px; color: #8a847a; text-transform: uppercase; letter-spacing: 1px; }
.hero-arrow { position: absolute; bottom: 24px; right: 28px; font-family: 'Playfair Display', serif; font-size: 13px; font-weight: 700; color: #2d4a5e; }
/* recent grid */
.hub-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 0; border-top: 2px solid #1a1714; border-bottom: 1px solid #c8c0b4; }
.hub-card { padding: 20px 20px 18px; border-bottom: 1px solid #c8c0b4; border-right: 1px solid #c8c0b4; text-decoration: none; color: inherit; transition: background 0.15s; position: relative; }
.hub-card:hover { background: #ede9e1; }
.hub-card-overline { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; font-weight: 700; margin-bottom: 6px; color: #2d4a5e; }
.hub-card-title { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 700; line-height: 1.3; margin-bottom: 8px; }
.hub-card-excerpt { font-size: 13px; color: #4a4540; line-height: 1.6; font-style: italic; }
.hub-card-arrow { position: absolute; top: 20px; right: 16px; font-size: 16px; color: #c8c0b4; }
.all-archives { text-align: center; margin: 30px 0 10px; }
.all-archives a { font-family: 'Playfair Display', serif; font-weight: 700; font-size: 14px; color: #2d4a5e; text-transform: uppercase; letter-spacing: 1.5px; }
.all-archives a:hover { color: #8b3a3a; }
.empty { padding: 40px 0; text-align: center; color: #8a847a; font-style: italic; }
.site-footer { text-align: center; padding: 24px; margin-top: 30px; border-top: 4px double #b5ad9f; font-family: 'Playfair Display', serif; font-size: 10px; color: #8a847a; letter-spacing: 2px; text-transform: uppercase; }
@media (max-width: 700px) { .masthead-title { font-size: 44px; } .masthead { padding: 24px 16px 0; } .nav-link { flex: 1 0 40%; text-align: center; border-right: none; border-bottom: 1px solid #c8c0b4; } .hub-grid { grid-template-columns: 1fr; } .hub-card { border-right: none; } .hero { padding: 24px 20px; } .hero-title { font-size: 28px; } .hero-arrow { display: none; } .page { padding: 0 16px; } }
</style>
</head>
<body>
<header class="masthead">
  <div class="masthead-rule-top"><span>Rather than news that sells &mdash; give me the truth</span></div>
  <h1 class="masthead-title"><a href="index.html">The World Affair</a></h1>
  <div class="masthead-meta" id="masthead-meta">
    <span>Intelligence quotidienne</span><span class="masthead-dot">&bull;</span>
    <span>NEXUS Intelligence</span>
  </div>
</header>
<nav class="nav-bar">
  <a class="nav-link active" href="index.html">Premi&egrave;re Page</a>
  <a class="nav-link" href="archive.html">Archives</a>
</nav>
<div class="page">
  <div id="hero"><div class="empty">Chargement de la derni&egrave;re &eacute;dition&hellip;</div></div>
  <div class="section-divider" id="recent-divider" style="display:none;">&Eacute;ditions r&eacute;centes</div>
  <div id="recent"></div>
  <div class="all-archives"><a href="archive.html">Toutes les archives &rarr;</a></div>
</div>
<div class="site-footer" id="footer">The World Affair &mdash; NEXUS Intelligence</div>
<script>
(function () {
  function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g, function(c){ return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'})[c]; }); }
  fetch('editions.json', { cache: 'no-cache' })
    .then(function (r) { if (!r.ok) throw new Error('manifest ' + r.status); return r.json(); })
    .then(function (data) {
      var eds = (data.editions || []).slice().sort(function (a, b) { return String(b.date).localeCompare(String(a.date)); });
      var heroEl = document.getElementById('hero');
      if (!eds.length) { heroEl.innerHTML = '<div class="empty">Aucune &eacute;dition pour le moment.</div>'; return; }

      var latest = eds[0];
      var isWeekly = latest.kind === 'weekly';
      var overlineLabel = isWeekly ? 'Synth&egrave;se de la semaine' : 'Derni&egrave;re &eacute;dition';
      var badge = isWeekly ? '<span class="kind-badge weekly">Hebdo</span>' : '<span class="kind-badge">Quotidien</span>';
      var metaBits = [];
      if (latest.number) metaBits.push('Edition N&deg;' + esc(latest.number));
      if (latest.cluster) metaBits.push('Cluster &middot; ' + esc(latest.cluster));

      heroEl.outerHTML =
        '<a class="hero" href="' + esc(latest.file) + '">' +
          '<div class="hero-overline">' + overlineLabel + ' ' + badge + '</div>' +
          '<div class="hero-title">' + esc(latest.weekday || latest.date) + '</div>' +
          (latest.summary ? '<div class="hero-summary">' + esc(latest.summary) + '</div>' : '') +
          (metaBits.length ? '<div class="hero-meta">' + metaBits.join(' &nbsp;&bull;&nbsp; ') + '</div>' : '') +
          '<div class="hero-arrow">Lire &rarr;</div>' +
        '</a>';

      var mm = document.getElementById('masthead-meta');
      mm.innerHTML =
        '<span>' + esc(latest.weekday || latest.date) + '</span><span class="masthead-dot">&bull;</span>' +
        (latest.number ? '<span>Edition N&deg;' + esc(latest.number) + '</span><span class="masthead-dot">&bull;</span>' : '') +
        '<span>NEXUS Intelligence</span>';

      var rest = eds.slice(1, 10);
      if (rest.length) {
        document.getElementById('recent-divider').style.display = '';
        var html = '<div class="hub-grid">';
        rest.forEach(function (e) {
          var ov = e.kind === 'weekly' ? 'Synth&egrave;se hebdo' : 'Quotidien';
          html += '<a class="hub-card" href="' + esc(e.file) + '">' +
            '<div class="hub-card-overline">' + ov + (e.number ? ' &middot; N&deg;' + esc(e.number) : '') + '</div>' +
            '<div class="hub-card-title">' + esc(e.weekday || e.date) + '</div>' +
            (e.summary ? '<div class="hub-card-excerpt">' + esc(e.summary) + '</div>' : '') +
            '<div class="hub-card-arrow">&rarr;</div>' +
          '</a>';
        });
        html += '</div>';
        document.getElementById('recent').innerHTML = html;
      }

      document.getElementById('footer').textContent = 'The World Affair — ' + eds.length + ' édition' + (eds.length > 1 ? 's' : '') + ' · NEXUS Intelligence';
    })
    .catch(function (err) {
      document.getElementById('hero').innerHTML = '<div class="empty">Manifest indisponible (' + esc(err.message) + ').</div>';
    });
})();
</script>
</body>
</html>
