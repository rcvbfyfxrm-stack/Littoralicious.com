<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<base href="/theworldaffair/">
<title>Archives &mdash; The World Affair</title>
<style>@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=UnifrakturMaguntia&display=swap');
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { font-family: 'Libre Baskerville', Georgia, 'Times New Roman', serif; background: #f4f1eb; color: #1a1714; line-height: 1.6; -webkit-font-smoothing: antialiased; min-height: 100vh; }
::selection { background: #2d4a5e; color: #f4f1eb; }
a { color: inherit; text-decoration: none; transition: color 0.15s; }
a:hover { color: #3a5a6a; }
.masthead { text-align: center; padding: 40px 24px 0; border-bottom: 4px double #b5ad9f; }
.masthead-rule-top { display: flex; align-items: center; gap: 14px; font-size: 9px; color: #8a847a; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 16px; }
.masthead-rule-top::before, .masthead-rule-top::after { content: ''; flex: 1; height: 1px; background: #c8c0b4; }
.masthead-title { font-family: 'UnifrakturMaguntia', 'Playfair Display', serif; font-size: 52px; font-weight: 400; letter-spacing: 2px; color: #1a1714; line-height: 1; margin: 0; }
.masthead-title a { text-decoration: none; color: inherit; }
.masthead-meta { display: flex; justify-content: center; align-items: center; gap: 20px; font-size: 11px; color: #8a847a; letter-spacing: 1px; text-transform: uppercase; margin-top: 14px; padding-bottom: 16px; flex-wrap: wrap; }
.masthead-dot { color: #c8c0b4; }
.nav-bar { display: flex; justify-content: center; gap: 0; border-bottom: 1px solid #c8c0b4; background: #ede9e1; padding: 0; flex-wrap: wrap; }
.nav-link { padding: 10px 18px; font-family: 'Libre Baskerville', serif; font-size: 11px; color: #4a4540; text-decoration: none; text-transform: uppercase; letter-spacing: 1.5px; border-right: 1px solid #c8c0b4; transition: all 0.15s; }
.nav-link:first-child { border-left: 1px solid #c8c0b4; }
.nav-link:hover { background: #e6e1d8; color: #1a1714; }
.nav-link.active { background: #1a1714; color: #f4f1eb; }
.page { max-width: 1100px; margin: 0 auto; padding: 0 24px; }
.archive-list { list-style: none; padding: 0; margin: 32px 0; border-top: 2px solid #1a1714; }
.archive-item { display: flex; justify-content: space-between; align-items: baseline; padding: 16px 4px; border-bottom: 1px solid #c8c0b4; gap: 16px; }
.archive-item:hover { background: #ede9e1; }
.archive-item a { color: #1a1714; font-family: 'Playfair Display', serif; font-weight: 700; font-size: 18px; text-decoration: none; }
.archive-item a:hover { color: #8b3a3a; }
.archive-right { display: flex; align-items: baseline; gap: 14px; flex-shrink: 0; }
.archive-kind { font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; padding: 2px 8px; border: 1px solid #2d4a5e; color: #2d4a5e; border-radius: 2px; }
.archive-kind.weekly { border-color: #8b3a3a; color: #8b3a3a; }
.archive-num { font-size: 11px; color: #8a847a; letter-spacing: 1px; text-transform: uppercase; }
.empty { padding: 40px 0; text-align: center; color: #8a847a; font-style: italic; }
.site-footer { text-align: center; padding: 24px; margin-top: 24px; border-top: 4px double #b5ad9f; font-family: 'Playfair Display', serif; font-size: 10px; color: #8a847a; letter-spacing: 2px; text-transform: uppercase; }
@media (max-width: 700px) { .masthead-title { font-size: 44px; } .masthead { padding: 24px 16px 0; } .nav-link { flex: 1 0 40%; text-align: center; border-right: none; border-bottom: 1px solid #c8c0b4; } .page { padding: 0 16px; } .archive-item a { font-size: 16px; } }
</style>
</head>
<body>
<header class="masthead">
  <div class="masthead-rule-top"><span>Rather than news that sells &mdash; give me the truth</span></div>
  <h1 class="masthead-title"><a href="index.html">The World Affair</a></h1>
  <div class="masthead-meta" id="masthead-meta">
    <span>Archives</span><span class="masthead-dot">&bull;</span>
    <span>NEXUS Intelligence</span>
  </div>
</header>
<nav class="nav-bar">
  <a class="nav-link" href="index.html">Premi&egrave;re Page</a>
  <a class="nav-link active" href="archive.html">Archives</a>
</nav>
<div class="page">
  <ul class="archive-list" id="archive-list"><li class="empty">Chargement des archives&hellip;</li></ul>
</div>
<div class="site-footer" id="footer">The World Affair &mdash; NEXUS Intelligence</div>
<script>
(function () {
  function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g, function(c){ return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'})[c]; }); }
  fetch('/theworldaffair/editions.json', { cache: 'no-cache' })
    .then(function (r) { if (!r.ok) throw new Error('manifest ' + r.status); return r.json(); })
    .then(function (data) {
      var eds = (data.editions || []).slice().sort(function (a, b) { return String(b.date).localeCompare(String(a.date)); });
      var list = document.getElementById('archive-list');
      if (!eds.length) { list.innerHTML = '<li class="empty">Aucune &eacute;dition archiv&eacute;e.</li>'; return; }
      var html = '';
      eds.forEach(function (e) {
        var kind = e.kind === 'weekly'
          ? '<span class="archive-kind weekly">Hebdo</span>'
          : '<span class="archive-kind">Quotidien</span>';
        html += '<li class="archive-item">' +
          '<a href="' + esc(e.file) + '">' + esc(e.weekday || e.date) + '</a>' +
          '<span class="archive-right">' + kind +
            (e.number ? '<span class="archive-num">N&deg;' + esc(e.number) + '</span>' : '') +
          '</span>' +
        '</li>';
      });
      list.innerHTML = html;
      var n = eds.length;
      document.getElementById('masthead-meta').innerHTML =
        '<span>Archives</span><span class="masthead-dot">&bull;</span>' +
        '<span>' + n + ' édition' + (n > 1 ? 's' : '') + '</span><span class="masthead-dot">&bull;</span>' +
        '<span>NEXUS Intelligence</span>';
      document.getElementById('footer').textContent = 'The World Affair — ' + n + ' édition' + (n > 1 ? 's' : '') + ' archivée' + (n > 1 ? 's' : '');
    })
    .catch(function (err) {
      document.getElementById('archive-list').innerHTML = '<li class="empty">Manifest indisponible (' + esc(err.message) + ').</li>';
    });
})();
</script>
</body>
</html>
