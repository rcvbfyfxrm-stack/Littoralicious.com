<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#fafafa"/>

  <!-- Subtle border -->
  <rect x="40" y="40" width="1120" height="550" fill="none" stroke="#d4d4d4" stroke-width="1"/>

  <!-- Flame logo — centered, scaled from logo.svg -->
  <g transform="translate(600, 220) scale(1.5)">
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="46" fill="none" stroke="#0a0a0a" stroke-width="1"/>
    <!-- The flame -->
    <path
      d="M 0 -35
         C -8 -20, -15 -10, -15 5
         C -15 22, 0 32, 0 32
         C 0 32, 15 22, 15 5
         C 15 -10, 8 -20, 0 -35
         Z"
      fill="none"
      stroke="#0a0a0a"
      stroke-width="2"
    />
    <!-- Inner flame -->
    <path
      d="M 0 -15
         C -4 -5, -7 2, -7 10
         C -7 20, 0 25, 0 25
         C 0 25, 7 20, 7 10
         C 7 2, 4 -5, 0 -15
         Z"
      fill="#0a0a0a"
    />
    <!-- Base wave -->
    <path d="M -15 32 C -10 28, -5 36, 0 32 C 5 28, 10 36, 15 32" fill="none" stroke="#0a0a0a" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- LITTORALICIOUS -->
  <text x="600" y="360" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="48" fill="#0a0a0a" letter-spacing="8">LITTORALICIOUS</text>

  <!-- Tagline -->
  <text x="600" y="400" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#6b7280" letter-spacing="3" text-transform="uppercase">MODERN SCIENCE AND REGIONAL RECIPES FROM THE SEA</text>

  <!-- Horizontal rule -->
  <line x1="480" y1="430" x2="720" y2="430" stroke="#d4d4d4" stroke-width="1"/>

  <!-- Bottom tagline -->
  <text x="600" y="465" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="18" fill="#2d4a5e" font-style="italic">One purpose: Nurture.</text>
</svg>
