<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --ink: #0a0a0a; --paper: #fafafa; --sea: #2d4a5e;
    --salt: #94a3b8; --border: #d4d4d4; --muted: #6b7280;
  }
  html, body { width: 1080px; height: 1350px; }
  body {
    background: var(--paper);
    font-family: Georgia, 'Times New Roman', serif;
    -webkit-font-smoothing: antialiased;
    display: flex; padding: 104px 110px;
  }
  .plate {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; text-align: center;
  }
  .head { display: flex; flex-direction: column; align-items: center; }
  .mark { width: 78px; height: 78px; margin-bottom: 40px; }
  .kicker {
    font-family: 'SF Mono', SFMono-Regular, Menlo, monospace;
    font-size: 19px; text-transform: uppercase; letter-spacing: 0.34em;
    color: var(--sea); margin-left: 0.34em;
  }
  .pillars {
    flex: 1; display: flex; flex-direction: column; justify-content: center;
    width: 100%; gap: 0;
  }
  .pillar {
    padding: 52px 0;
    border-top: 1px solid var(--border);
  }
  .pillar:last-child { border-bottom: 1px solid var(--border); }
  .pillar__num {
    font-family: 'SF Mono', SFMono-Regular, Menlo, monospace;
    font-size: 17px; letter-spacing: 0.2em; color: var(--salt);
    margin-bottom: 16px;
  }
  .pillar__name {
    font-size: 48px; font-weight: 400; color: var(--ink);
    letter-spacing: 0.02em; margin-bottom: 18px;
  }
  .pillar__desc {
    font-size: 26px; line-height: 1.5; color: var(--muted);
    max-width: 30ch; margin: 0 auto; font-style: italic;
  }
  .foot {
    font-family: 'SF Mono', SFMono-Regular, Menlo, monospace;
    font-size: 18px; text-transform: uppercase; letter-spacing: 0.28em;
    color: var(--salt); margin-top: 48px; margin-left: 0.28em;
  }
</style>
</head>
<body>
  <div class="plate">
    <div class="head">
      <svg class="mark" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <circle cx="50" cy="50" r="46" fill="none" stroke="#0a0a0a" stroke-width="1"/>
        <path d="M 50 15 C 42 30, 35 40, 35 55 C 35 72, 50 82, 50 82 C 50 82, 65 72, 65 55 C 65 40, 58 30, 50 15 Z" fill="none" stroke="#0a0a0a" stroke-width="2"/>
        <path d="M 50 35 C 46 45, 43 52, 43 60 C 43 70, 50 75, 50 75 C 50 75, 57 70, 57 60 C 57 52, 54 45, 50 35 Z" fill="#0a0a0a"/>
        <path d="M 35 82 C 40 78, 45 86, 50 82 C 55 78, 60 86, 65 82" fill="none" stroke="#2d4a5e" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <div class="kicker">What's Inside</div>
    </div>
    <div class="pillars">
      <div class="pillar">
        <div class="pillar__num">01</div>
        <div class="pillar__name">Modern Science</div>
        <div class="pillar__desc">Why food behaves the way it does — tested, cited, and built for the pass.</div>
      </div>
      <div class="pillar">
        <div class="pillar__num">02</div>
        <div class="pillar__name">Regional Recipes</div>
        <div class="pillar__desc">The dishes of a coastline, cooked with respect for where they come from.</div>
      </div>
      <div class="pillar">
        <div class="pillar__num">03</div>
        <div class="pillar__name">From the Sea</div>
        <div class="pillar__desc">Provisioned, plated, and served at the water's edge.</div>
      </div>
    </div>
    <div class="foot">Littoralicious</div>
  </div>
</body>
</html>
