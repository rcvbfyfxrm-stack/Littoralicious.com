<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --ink: #0a0a0a;
    --paper: #fafafa;
    --sea: #2d4a5e;
    --salt: #94a3b8;
    --border: #d4d4d4;
  }
  html, body { width: 1080px; height: 1350px; }
  body {
    background: var(--paper);
    font-family: Georgia, 'Times New Roman', serif;
    -webkit-font-smoothing: antialiased;
    display: flex;
    align-items: stretch;
    padding: 48px;
  }
  .plate {
    flex: 1;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 0 60px;
  }
  .lockup {
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .mark { width: 168px; height: 168px; margin-bottom: 56px; }
  .name {
    font-size: 96px;
    font-weight: 400;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink);
    line-height: 1.2;
    margin-left: 0.08em; /* optical centering against tracking */
  }
  .tagline {
    font-family: 'SF Mono', SFMono-Regular, Menlo, monospace;
    font-size: 21px;
    text-transform: uppercase;
    letter-spacing: 0.25em;
    color: var(--salt);
    margin-top: 40px;
    padding-top: 34px;
    border-top: 1px solid var(--border);
    margin-left: 0.25em;
  }
  .tagline .dot { color: var(--sea); }
  .site {
    position: absolute;
    bottom: 52px;
    left: 0;
    right: 0;
    font-family: 'SF Mono', SFMono-Regular, Menlo, monospace;
    font-size: 17px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--sea);
    margin-left: 0.3em;
  }
</style>
</head>
<body>
  <div class="plate">
    <div class="lockup">
    <svg class="mark" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <circle cx="50" cy="50" r="46" fill="none" stroke="#0a0a0a" stroke-width="1"/>
      <path d="M 50 15 C 42 30, 35 40, 35 55 C 35 72, 50 82, 50 82 C 50 82, 65 72, 65 55 C 65 40, 58 30, 50 15 Z"
            fill="none" stroke="#0a0a0a" stroke-width="2"/>
      <path d="M 50 35 C 46 45, 43 52, 43 60 C 43 70, 50 75, 50 75 C 50 75, 57 70, 57 60 C 57 52, 54 45, 50 35 Z"
            fill="#0a0a0a"/>
      <path d="M 35 82 C 40 78, 45 86, 50 82 C 55 78, 60 86, 65 82"
            fill="none" stroke="#2d4a5e" stroke-width="2" stroke-linecap="round"/>
    </svg>
    <div class="name">Littoralicious</div>
    <div class="tagline">Modern Science <span class="dot">&middot;</span> Regional Recipes <span class="dot">&middot;</span> From the Sea</div>
    </div>
  </div>
</body>
</html>
